- name: Test GitHub Access
  env:
    GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
  run: |

    echo "Checking authentication..."

    gh auth status

    echo ""
    echo "Testing API..."

    gh api user

    echo ""
    echo "Listing organization repos..."

    ORG="Dev"

    gh repo list $ORG --limit 10
