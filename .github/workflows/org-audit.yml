name: GitHub Governance Report

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'   # 8:30 PM EST

jobs:
  report:
    runs-on: ubuntu-latest

    steps:

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install gh jq -y

      - name: Generate CSV Report
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: |

          USER=$(gh api user --jq '.login')

          echo "repo,owner,branch,last_commit_author,last_commit_date,commit_count,pr_count" > report.csv

          repos=$(gh repo list $USER --limit 100 --json name --jq '.[].name')

          for repo in $repos
          do
            echo "Processing $repo"

            branch=$(gh repo view $USER/$repo --json defaultBranchRef --jq '.defaultBranchRef.name')

            last_commit_author=$(gh api repos/$USER/$repo/commits/$branch --jq '.commit.author.name' 2>/dev/null)
            last_commit_date=$(gh api repos/$USER/$repo/commits/$branch --jq '.commit.author.date' 2>/dev/null)

            commit_count=$(gh api repos/$USER/$repo/commits --jq 'length' 2>/dev/null)
            pr_count=$(gh api repos/$USER/$repo/pulls --jq 'length' 2>/dev/null)

            echo "$repo,$USER,$branch,$last_commit_author,$last_commit_date,$commit_count,$pr_count" >> report.csv

          done

      - name: Show CSV
        run: cat report.csv

      - name: Send Email with CSV
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "GitHub Governance Report (CSV)"
          to: ${{ secrets.EMAIL_USER }}
          from: GitHub Bot
          body: |
            Hi,

            Please find attached the latest GitHub governance report.

            This includes:
            - Repositories
            - Branch details
            - Last commit info
            - PR counts

            Regards,
            GitHub Automation Bot
          attachments: report.csv
